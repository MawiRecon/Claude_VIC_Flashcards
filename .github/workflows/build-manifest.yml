name: Build cards manifest

# Rebuilds cards.json from the image folders on every push, then commits it back.
# A commit made here uses the default GITHUB_TOKEN, which by design does NOT
# re-trigger this workflow — so there is no commit loop.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-manifest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild cards.json (merge, never wipe edits)
        id: build
        run: node scripts/build-manifest.js

      - name: Commit cards.json if it changed
        if: steps.build.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.json
          git commit -m "chore: rebuild cards.json [skip ci]"
          git push
